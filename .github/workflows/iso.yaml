name: Make and Release TortugaLinux ISOs
on:
  workflow_run:
    workflows: ["Build TortugaLinux"]
    types:
      - completed
    branches: [ main ]

jobs:
  build-isos:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Free up GitHub runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Create output directories
        run: |
          mkdir -p ./output-max
          mkdir -p ./output-min

      - name: Pull TortugaLinux Max Image
        run: |
          IMAGE_PATH=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sudo podman pull $IMAGE_PATH:max

      - name: Build TortugaLinux Max ISO
        run: |
          IMAGE_PATH=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sudo podman run --rm -it --privileged \
            -v ./output-max:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --rootfs btrfs \
            --output /output \
            $IMAGE_PATH:max

      - name: Pull TortugaLinux Min Image
        run: |
          IMAGE_PATH=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sudo podman pull $IMAGE_PATH:min

      - name: Build TortugaLinux Min ISO
        run: |
          IMAGE_PATH=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sudo podman run --rm -it --privileged \
            -v ./output-min:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --rootfs btrfs \
            --output /output \
            $IMAGE_PATH:min

      - name: Rename and Split ISO files
        run: |
          sudo chown -R $USER:$USER ./output-max ./output-min
          
          mv ./output-max/bootiso/install.iso ./TortugaLinux-Max-1.0-${{ github.run_number }}.iso
          mv ./output-min/bootiso/install.iso ./TortugaLinux-Min-1.0-${{ github.run_number }}.iso
          
          split -b 1900M ./TortugaLinux-Max-1.0-${{ github.run_number }}.iso ./TortugaLinux-Max-1.0-${{ github.run_number }}.iso.part-
          split -b 1900M ./TortugaLinux-Min-1.0-${{ github.run_number }}.iso ./TortugaLinux-Min-1.0-${{ github.run_number }}.iso.part-
          
          rm -f ./TortugaLinux-Max-1.0-${{ github.run_number }}.iso
          rm -f ./TortugaLinux-Min-1.0-${{ github.run_number }}.iso

      - name: Generate Release Tag
        run: echo "RELEASE_TAG=$(date +'%Y.%m.%d')-build-${{ github.run_number }}" >> $GITHUB_ENV

      - name: Create GitHub Release and Upload ISOs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: TortugaLinux Build ${{ env.RELEASE_TAG }}
          body: |
            ## TortugaLinux 1.0 (${{ env.RELEASE_TAG }})
            
            This release contains the latest automated ISO images for TortugaLinux generated by GitHub Actions.
            
            ### Reassembly Instructions
            To bypass GitHub's 2GB file limitations, these image assets are split into multi-part files (`.part-aa`, `.part-ab`, etc.). You must recombine them into a single `.iso` file before flashing.
            
            **Linux / macOS**  
            ```bash
            cat TortugaLinux-Max-1.0-${{ github.run_number }}.iso.part-* > TortugaLinux-Max-1.0-${{ github.run_number }}.iso
            ```
            
            **Windows (Command Prompt)**  
            ```cmd
            copy /b TortugaLinux-Max-1.0-${{ github.run_number }}.iso.part-* TortugaLinux-Max-1.0-${{ github.run_number }}.iso
            ```

            Then use your preffered tool to flash the ISO to a flash drive and boot from it on real hardware, or use the ISOs with VMs.  
            See you on the other side. ;)

            ---
            _Generated automatically by GitHub Actions Run ID: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_
          files: |
            ./TortugaLinux-Max-1.0-${{ github.run_number }}.iso.part-*
            ./TortugaLinux-Min-1.0-${{ github.run_number }}.iso.part-*
          draft: false
          prerelease: false